# ============================================================
# netlify.toml — Anant Kumar Portfolio (anantkumar.site)
# ============================================================

[build]
  publish = "."       # root of the repo is the publish dir (static site)
  command = ""        # no build step needed for plain HTML/CSS/JS

# ── Redirects ─────────────────────────────────────────────
# www → apex (canonical domain consolidation for SEO)
[[redirects]]
  from   = "https://www.anantkumar.site/*"
  to     = "https://anantkumar.site/:splat"
  status = 301
  force  = true

# 404 fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404

# ── Global HTTP Headers (all pages) ──────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Security — boosts Google Trust Signals
    X-Frame-Options            = "SAMEORIGIN"
    X-XSS-Protection           = "1; mode=block"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security  = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://media.licdn.com data:; connect-src 'self';"

    # Performance — Core Web Vitals
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# ── Long-lived cache for static assets ───────────────────
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Sitemap / robots — never cache stale ─────────────────
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "text/plain; charset=utf-8"

# ── HTML pages — short cache, always revalidate ──────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/pages/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
